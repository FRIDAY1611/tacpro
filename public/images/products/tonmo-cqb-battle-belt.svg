<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a6a6a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <!-- Shield icon -->
  <g transform="translate(300, 220)" filter="url(#shadow)">
    <path d="M0-80 L100-40 L100 40 Q100 100 0 140 Q-100 100 -100 40 L-100-40 Z"
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
    <path d="M0-60 L70-30 L70 30 Q70 80 0 110 Q-70 80 -70 30 L-70-30 Z"
          fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="40" font-family="Arial">✦</text>
  </g>
  <!-- Category label -->
  <text x="300" y="360" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="20" font-family="Arial, sans-serif" letter-spacing="3">
    BELT
  </text>
  <!-- Product name -->
  <text x="300" y="400" text-anchor="middle" fill="white" font-size="22" font-family="Arial, sans-serif" font-weight="bold">
    Customizable Polyester Battle Belt CQB
  </text>
  <!-- Brand -->
  <text x="300" y="440" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="14" font-family="Arial, sans-serif" letter-spacing="2">
    WEARTAC
  </text>
  <!-- Bottom bar -->
  <rect x="200" y="520" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- OEM/Manufacturing note -->
  <text x="300" y="560" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="11" font-family="Arial, sans-serif">
    OEM / Custom Manufacturing Available
  </text>
</svg>